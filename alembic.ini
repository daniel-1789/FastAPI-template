[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os
# Migration filenames: 20260523_abc123_my_message.py — date first so `ls` sorts by history.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s
# sqlalchemy.url is read from app.config (DATABASE_URL) in alembic/env.py.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
